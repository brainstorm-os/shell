[package]
name = "brainstorm_embed"
version = "0.0.1"
edition = "2021"
publish = false
license = "UNLICENSED"
description = "Native NAPI-RS embedding addon for Brainstorm (fastembed-rs / ONNX Runtime, local semantic-search embeddings — plan 11.3). Isolated from the crypto crate so ONNX Runtime never links into the security-critical binary."

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi8"] }
napi-derive = "3"
fastembed = "4"
# Already in the tree via fastembed/hf-hub/ort — reused (no new supply-chain
# surface) to self-fetch the model with a pinned-SHA256 integrity check.
ureq = "2"
sha2 = "0.10"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
codegen-units = 1
opt-level = 3
