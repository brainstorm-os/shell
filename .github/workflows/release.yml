name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual dry-run: builds the full matrix but never publishes (see the
  # publish-guard in the Package step), so the release pipeline can be tested
  # on a branch without burning a version tag.
  workflow_dispatch: {}

# Don't cancel a release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # Mirror of ci.yml's matrix. Keep the two in sync; if a runner is
      # added/removed, mirror in both.
      matrix:
        include:
          # macOS — ONE Apple-Silicon runner cross-builds BOTH arches. Rust
          # cross-compiles x86_64 (rust-extra), both native addons build
          # (napi-extra), and `package:mac` stays UNPINNED so it produces x64 +
          # arm64 .dmg/.zip — each with its correct native. codesign + notarize
          # are arch-agnostic, so the x64 artefact signs/notarises fine on the
          # arm64 host. This removes the dependency on scarce/retired macos-13
          # (Intel) runners. The -c flags apply the signed posture (Developer ID
          # hardened runtime + entitlements + notarisation) over the package.json
          # ad-hoc defaults (13.11). Diverges from ci.yml's test matrix by design.
          - os: macos
            arch: universal
            runner: macos-14
            rust-target: aarch64-apple-darwin
            rust-extra: x86_64-apple-darwin
            napi-script: build:darwin-arm64
            napi-extra: build:darwin-x64
            builder-platform: "--mac"
            builder-targets: "dmg zip"
            builder-archs: "arm64 x64"
            sign-args: >-
              -c.mac.hardenedRuntime=true
              -c.mac.entitlements=build/entitlements.mac.plist
              -c.mac.entitlementsInherit=build/entitlements.mac.inherit.plist
              -c.mac.notarize=true
          # Windows + Linux: pin each runner to its own arch (target:arch) so it
          # never builds the other (broken — its native isn't built on this host).
          # Windows ships x64 only — it runs on Windows-on-ARM via emulation, and
          # a second arm64 runner would collide on the single latest.yml / Setup
          # .exe name. Native arm64 Windows is a follow-up (build both on one
          # runner, mirroring macOS).
          - os: windows-2022
            arch: x64
            runner: windows-2022
            rust-target: x86_64-pc-windows-msvc
            napi-script: build:windows-x64
            builder-platform: "--win"
            builder-targets: "nsis"
            builder-archs: "x64"
          - os: ubuntu-22.04
            arch: x64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            napi-script: build:linux-x64
            builder-platform: "--linux"
            builder-targets: "AppImage deb"
            builder-archs: "x64"
          - os: ubuntu-22.04-arm
            arch: arm64
            runner: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            napi-script: build:linux-arm64
            builder-platform: "--linux"
            builder-targets: "AppImage deb"
            builder-archs: "arm64"
    permissions:
      contents: write  # to create release drafts
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup-bun-rust
        with:
          rust-target: ${{ matrix.rust-target }}

      - name: Build native + apps + shell
        shell: bash
        run: |
          if [ -n "${{ matrix.rust-extra }}" ]; then rustup target add ${{ matrix.rust-extra }}; fi
          bun run --filter @brainstorm/native ${{ matrix.napi-script }}
          if [ -n "${{ matrix.napi-extra }}" ]; then bun run --filter @brainstorm/native ${{ matrix.napi-extra }}; fi
          bun run --filter @brainstorm/shell build
          bun run build:apps

      - name: Package
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # macOS notarisation (app-specific-password auth; electron-builder `mac.notarize: true`)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Build the target:arch spec (the ONLY form that overrides the
          # config's per-target arch arrays — bare --x64/--arm64 are ignored).
          # The spec must follow the platform flag, not trail as positionals.
          spec=""
          for t in ${{ matrix.builder-targets }}; do
            for a in ${{ matrix.builder-archs }}; do
              spec="$spec $t:$a"
            done
          done
          cd packages/shell
          # Publish only on a real tag push; a manual workflow_dispatch is a
          # dry-run (build the matrix, upload nothing). electron-builder's
          # --publish always already CREATES the draft release and uploads every
          # artifact to it — no separate "create release" job (that produced a
          # second, empty duplicate draft).
          publish=${{ github.event_name == 'push' && 'always' || 'never' }}
          bunx electron-builder ${{ matrix.builder-platform }} $spec --publish "$publish" ${{ matrix.sign-args }}

  # electron-builder's `--publish always` (above) CREATES the release as a
  # DRAFT and uploads every artifact to it, but never publishes it and never
  # writes notes — so historically each release had to be published by hand and
  # shipped with an empty body. This job runs once, after every matrix leg has
  # uploaded its artifacts, to generate notes from the merged PRs and flip the
  # draft to a published "latest" release. Tag-push only; a workflow_dispatch
  # dry-run builds nothing to publish.
  finalize:
    name: Publish release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write  # to publish the release + set notes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate notes + publish the draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # GitHub auto-picks the previous release for the diff; the "What's
          # Changed" body lists every merged PR since it. Prepend the tag's
          # annotation subject as a one-line human summary when present.
          gen=$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body')
          summary=$(git for-each-ref "refs/tags/${TAG}" --format='%(contents:subject)')
          { [ -n "$summary" ] && printf '%s\n\n' "$summary"; printf '%s\n' "$gen"; } > notes.md
          # The draft already exists (electron-builder created it for this tag).
          gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" \
            --draft=false --latest --notes-file notes.md
