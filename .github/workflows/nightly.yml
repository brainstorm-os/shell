name: Nightly

# Unsigned nightly builds. We do not yet hold Apple Developer ID or
# Windows code-signing certificates, so the package step deliberately omits
# every CSC_* / WIN_CSC_* env var: electron-builder ad-hoc-signs macOS
# (hardenedRuntime:false + gatekeeperAssess:false in build config, no
# notarize) and ships Windows/Linux unsigned. Wire the real certs in here
# (mirror release.yml's env block) once they exist.

on:
  # Daily schedule is OFF until we hold signing certs + an updater (the builds
  # are unsigned and nothing consumes the prerelease yet), and to cap Actions
  # spend — a 6-OS build+publish every night is expensive. Re-enable the cron
  # when release infra lands. Until then, run on demand via the Actions tab.
  # schedule:
  #   - cron: "0 7 * * *" # 07:00 UTC daily (~midnight US Pacific)
  workflow_dispatch: {}

# One nightly at a time; a newer trigger supersedes an in-flight run.
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write # roll the `nightly` prerelease

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # Runner/arch/native columns mirror ci.yml / release.yml — keep the three
      # in sync. Unlike those, packaging here is pinned to the row's single arch
      # (builder-platform + builder-targets, see the Package step): the shared
      # build config declares arch:["x64","arm64"] per target, so an unpinned
      # `package:*` would build BOTH arches on every runner — and the cross-arch
      # half is broken (its native isn't built on that host). One arch per job
      # keeps the published binaries correct and collision-free on merge.
      matrix:
        include:
          - os: macos-13
            arch: x64
            runner: macos-13
            rust-target: x86_64-apple-darwin
            napi-script: build:darwin-x64
            builder-platform: "--mac"
            builder-targets: "dmg zip"
          - os: macos-14
            arch: arm64
            runner: macos-14
            rust-target: aarch64-apple-darwin
            napi-script: build:darwin-arm64
            builder-platform: "--mac"
            builder-targets: "dmg zip"
          - os: windows-2022
            arch: x64
            runner: windows-2022
            rust-target: x86_64-pc-windows-msvc
            napi-script: build:windows-x64
            builder-platform: "--win"
            builder-targets: "nsis"
          - os: windows-11-arm
            arch: arm64
            runner: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            napi-script: build:windows-arm64
            builder-platform: "--win"
            builder-targets: "nsis"
          - os: ubuntu-22.04
            arch: x64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            napi-script: build:linux-x64
            builder-platform: "--linux"
            builder-targets: "AppImage deb"
          - os: ubuntu-22.04-arm
            arch: arm64
            runner: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            napi-script: build:linux-arm64
            builder-platform: "--linux"
            builder-targets: "AppImage deb"
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup-bun-rust
        with:
          rust-target: ${{ matrix.rust-target }}

      - name: Build native + apps + shell
        shell: bash
        run: |
          bun run --filter @brainstorm/native ${{ matrix.napi-script }}
          bun run --filter @brainstorm/shell build
          bun run build:apps

      - name: Package (unsigned)
        shell: bash
        env:
          # No certificates yet — force electron-builder to skip Apple identity
          # discovery (ad-hoc sign) rather than fail looking for a Developer ID.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          # Pin every target to this row's arch (`<target>:<arch>`); a bare
          # `--mac/--win/--linux` would honour the config's two-arch arrays and
          # build the other (broken) arch too. CLI `--x64/--arm64` flags are
          # *ignored* when the config sets per-target arch — only the
          # `target:arch` form overrides it.
          spec=""
          for t in ${{ matrix.builder-targets }}; do
            spec="$spec $t:${{ matrix.arch }}"
          done
          cd packages/shell
          bunx electron-builder ${{ matrix.builder-platform }} $spec --publish never

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p staged
          # Only the distributable installer files — not unpacked app dirs or
          # the auto-update *.yml (no updater wired yet). Each job built a single
          # arch, so sibling artefacts never collide on merge.
          find packages/shell/dist -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \
            -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} staged/ \;

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}-${{ matrix.arch }}
          path: staged/*
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish rolling nightly prerelease
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: installers
          merge-multiple: true

      - name: Roll the `nightly` prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y-%m-%d)"
          # Reset the rolling tag + release so stale platform files don't linger,
          # then recreate it pointing at this run's commit.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          # --generate-notes appends a categorised "What's Changed" section
          # (grouped per .github/release.yml) below the contextual note.
          gh release create nightly \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "Nightly ${stamp}" \
            --generate-notes \
            --notes "Unsigned automated build from ${{ github.sha }} (${stamp}). macOS is ad-hoc signed; Windows/Linux are unsigned — expect Gatekeeper/SmartScreen warnings." \
            installers/*
