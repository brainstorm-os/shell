# Shapes the auto-generated "What's Changed" notes that
# `gh release create --generate-notes` produces (Alpha / Release / Nightly
# workflows). GitHub reads this from the default branch, so one file covers
# every release. PRs are grouped into the categories below by label; the final
# "*" catch-all guarantees nothing is dropped even when a PR is unlabelled.
#
# To get a PR into a section, add the matching label before it merges.
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🎨 Design & UX
      labels:
        - design
        - ux
    - title: ⚡ Performance
      labels:
        - performance
    - title: 🔒 Security
      labels:
        - security
    - title: 🧰 Maintenance, CI & Docs
      labels:
        - chore
        - ci
        - docs
        - dependencies
    - title: 📦 Other Changes
      labels:
        - "*"
